<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CRITI_Q - Giriş Yap</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800&family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: linear-gradient(135deg, #ff8c42 0%, #a30000 100%);
            font-family: 'Poppins', sans-serif;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-container {
            display: flex;
            width: 100%;
            max-width: 750px;
            height: 450px;
            background-color: #3e0e0e;
            border-radius: 20px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
            overflow: hidden;
        }

        .left-panel {
            flex: 1;
            background-color: #eaddcf;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .left-panel img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .right-panel {
            flex: 1;
            padding: 40px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            color: #fff;
        }

        h2 {
            font-family: 'Montserrat', sans-serif;
            font-weight: 800;
            font-size: 28px;
            color: #ffd700;
            margin-bottom: 10px;
        }

        p.subtitle {
            font-size: 13px;
            color: #ccc;
            margin-bottom: 25px;
            line-height: 1.4;
        }

        .input-group { margin-bottom: 15px; }

        label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            color: #ffd700;
            margin-bottom: 5px;
        }

        input {
            width: 100%;
            padding: 10px;
            border: none;
            border-bottom: 2px solid #555;
            background: transparent;
            color: #fff;
            outline: none;
            transition: 0.3s;
        }

        input::placeholder { color: #666; font-size: 12px; }
        input:focus { border-bottom-color: #ffd700; }

        .btn-login {
            width: 100%;
            padding: 12px;
            margin-top: 10px;
            background-color: #b30000;
            color: white;
            border: none;
            border-radius: 25px;
            font-weight: 700;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: 'Montserrat', sans-serif;
        }

        .btn-login:hover {
            background-color: #d60000;
            transform: scale(1.02);
            box-shadow: 0 5px 15px rgba(179, 0, 0, 0.4);
        }

        .footer-links {
            display: flex;
            justify-content: space-between;
            margin-top: 15px;
            font-size: 11px;
        }

        .footer-links a {
            color: #aaa;
            text-decoration: none;
            transition: 0.3s;
        }
        .footer-links a:hover { color: #fff; }
    </style>
</head>
<body>

    <div class="login-container">
        
        <div class="left-panel">
            <img src="/static/poster.jpg" alt="Criti_Q Poster">
        </div>

        <div class="right-panel">
            <h2>Giriş Yap</h2>
            <p class="subtitle">Sinema dünyasının kalite standartına hoş geldin.</p>

            <form action="/login" method="POST">
                <div class="input-group">
                    <label>Kullanıcı Adı</label>
                    <input type="text" name="username" placeholder="Adınızı girin..." required>
                </div>

                <div class="input-group">
                    <label>Şifre</label>
                    <input type="password" name="password" placeholder="........" required>
                </div>

                <button type="submit" class="btn-login">Hemen Katıl</button>

                <div class="footer-links">
                    <a href="#">Hesap Oluştur</a>
                    <a href="#">Şifremi Unuttum</a>
                </div>
            </form>
        </div>

    </div>

</body>
</html>
